version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: pg-legal
    restart: always
    environment:
      POSTGRES_DB: legal_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: spring-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  ai-service:
    build: ./ai-service
    container_name: fastapi-ai
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: react-frontend
    ports:
      - "3000:3000"

volumes:
  pgdata: